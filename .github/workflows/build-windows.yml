name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend
            src-tauri

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Cache llama-server binary
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe
          key: llama-server-b5535-windows-avx2

      - name: Download llama-server
        if: steps.cache-llama.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          $tag = "b5535"
          $zip = "llama-$tag-bin-win-avx2-x64.zip"
          $url = "https://github.com/ggerganov/llama.cpp/releases/download/$tag/$zip"
          Invoke-WebRequest -Uri $url -OutFile llama.zip
          Expand-Archive llama.zip -DestinationPath llama-bin
          Copy-Item llama-bin/llama-server.exe src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe

      - name: Cache model GGUF
        id: cache-model
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
          key: llama-3.1-8b-instruct-q4km

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/models
          $url = "https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
          Invoke-WebRequest -Uri $url -OutFile src-tauri/resources/models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: columba-windows
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
